<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'>
  <defs>
    <style>
      .grid-base { fill: #f2f2f2; stroke: #666666; stroke-width: 1.5; }
      .line { stroke: #666666; stroke-width: 1.2; fill: none; stroke-linecap: square; }
      .highlight { fill: #f2c811; }
      .funnel { fill: #ffffff; stroke: #333333; stroke-width: 2; stroke-linejoin: round; }
    </style>

    <clipPath id='gridClip'>
      <rect x='2' y='2' width='60' height='56' rx='4'/>
    </clipPath>
  </defs>

  <!-- Grid fills canvas (small bottom padding) -->
  <rect class='grid-base' x='2' y='2' width='60' height='56' rx='4'/>

  <!-- Highlights -->
  <g clip-path='url(#gridClip)'>
    <!-- First row -->
    <rect class='highlight' x='2' y='2' width='60' height='18.7'/>
    <!-- First column -->
    <rect class='highlight' x='2' y='2' width='20' height='56'/>
  </g>

  <!-- Grid lines -->
  <line class='line' x1='2' y1='20.7' x2='62' y2='20.7'/>
  <line class='line' x1='2' y1='39.3' x2='62' y2='39.3'/>
  <line class='line' x1='22' y1='2' x2='22' y2='58'/>
  <line class='line' x1='42' y1='2' x2='42' y2='58'/>

  <!-- Border redraw -->
  <rect x='2' y='2' width='60' height='56' rx='4' fill='none' stroke='#666666' stroke-width='1.5'/>

  <!-- Smaller funnel, bottom-right, no bottom padding -->
  <path class='funnel' d='M36 34h24l-9 11v11l-5 3v-14z'/>
</svg>